name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  analyze-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib test pigeons example/lib example/test example/integration_test

      - name: Analyze
        run: flutter analyze

      - name: Test Dart implementation and bridges
        run: flutter test test

      - name: Publish dry run
        run: dart pub publish --dry-run
